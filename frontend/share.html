<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loading project... | NexusAI</title>
<meta name="description" content="A startup built with NexusAI in minutes — see the full breakdown"/>
<meta property="og:title" content="A startup built with AI in minutes"/>
<meta property="og:description" content="Built by AI agents collaborating: CEO, Product, Design, Dev, Marketing, Deploy"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="icon" type="image/svg+xml" href="logo.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0f;color:#f0f0f5;font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  background-image:
    radial-gradient(circle at 20% 0%, #c6f13510 0%, transparent 40%),
    radial-gradient(circle at 80% 100%, #35f1c610 0%, transparent 40%);
}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px}
.hero{
  background:linear-gradient(135deg,#111118,#1a1a24);
  border:1px solid #ffffff18;border-radius:20px;padding:32px;margin-bottom:24px;
}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:13px;color:#7a7a9a}
.brand img{width:24px;height:24px}
.title{font-size:32px;font-weight:700;margin-bottom:12px;background:linear-gradient(135deg,#c6f135,#35f1c6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.idea{font-size:16px;color:#a0a0c0;line-height:1.5;margin-bottom:20px}
.meta{display:flex;gap:16px;font-size:12px;color:#7a7a9a;margin-bottom:24px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:6px}
.cta-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;border:none}
.btn-primary{background:linear-gradient(135deg,#c6f135,#35f1c6);color:#000}
.btn-secondary{background:#22222f;color:#f0f0f5;border:1px solid #ffffff18}
.section{
  background:#111118;border:1px solid #ffffff0d;border-radius:16px;
  padding:24px;margin-bottom:16px;
}
.section-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;margin-bottom:16px}
.section-emoji{font-size:24px}
.feature-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.feature-card{background:#1a1a24;border:1px solid #ffffff0d;border-radius:10px;padding:14px}
.feature-name{font-size:13px;font-weight:600;margin-bottom:4px}
.feature-desc{font-size:12px;color:#a0a0c0;line-height:1.4}
.priority{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-top:6px;text-transform:uppercase;font-weight:700}
.priority.high{background:#c6f13520;color:#c6f135}
.priority.medium{background:#fbbf2420;color:#fbbf24}
.priority.low{background:#7a7a9a20;color:#a0a0c0}
.persona-card{background:#1a1a24;border-radius:10px;padding:14px;margin-bottom:8px}
.persona-name{font-weight:600;font-size:13px;margin-bottom:6px}
.persona-list{font-size:12px;color:#a0a0c0;margin-top:6px}
.persona-list ul{padding-left:18px;margin-top:4px}
pre{
  background:#0a0a0f;border:1px solid #ffffff0d;border-radius:8px;
  padding:14px;font-size:11px;color:#a0a0c0;overflow:auto;
  font-family:'SF Mono',Monaco,monospace;line-height:1.4;
  max-height:400px;
}
.tag{display:inline-block;background:#22222f;border:1px solid #ffffff18;padding:3px 8px;border-radius:99px;font-size:11px;margin:2px;color:#a0a0c0}
.preview-frame{
  width:100%;height:600px;border:1px solid #ffffff0d;border-radius:12px;background:#fff;
}
.footer{
  text-align:center;padding:32px 20px;color:#7a7a9a;font-size:13px;
  margin-top:32px;border-top:1px solid #ffffff0d
}
.footer a{color:#c6f135;text-decoration:none;font-weight:600}
.loading{text-align:center;padding:80px 20px;color:#7a7a9a}
.spinner{width:40px;height:40px;border:3px solid #ffffff18;border-top-color:#c6f135;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.share-bar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#111118;border:1px solid #ffffff18;border-radius:99px;padding:8px;
  display:flex;gap:6px;box-shadow:0 8px 30px #0008;z-index:50;
}
.share-btn{
  width:40px;height:40px;border-radius:50%;background:#22222f;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;color:#f0f0f5;
}
.share-btn:hover{background:#c6f135;color:#000}
.cta-banner{
  background:linear-gradient(135deg,#c6f13520,#35f1c620);
  border:1px solid #c6f13540;border-radius:16px;padding:24px;text-align:center;margin:32px 0;
}
.cta-banner h2{font-size:24px;margin-bottom:8px}
.cta-banner p{color:#a0a0c0;font-size:14px;margin-bottom:16px}
@media(max-width:600px){
  .title{font-size:24px}
  .feature-grid{grid-template-columns:1fr}
  .share-bar{bottom:10px}
}
</style>
</head>
<body>

<div class="wrap">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading project...
    </div>
  </div>
</div>

<div id="share-bar" class="share-bar" style="display:none">
  <button class="share-btn" onclick="copyShare()" title="Copy link">🔗</button>
  <button class="share-btn" onclick="shareTwitter()" title="Twitter">𝕏</button>
  <button class="share-btn" onclick="shareLinkedIn()" title="LinkedIn">in</button>
  <button class="share-btn" onclick="shareWhatsApp()" title="WhatsApp">💬</button>
</div>

<script>
const API='https://nexusai-production-6504.up.railway.app';
const params=new URLSearchParams(location.search);
const shareId=params.get('id')||location.pathname.split('/').pop();

let projectData=null;

async function loadProject(){
  if(!shareId||shareId==='share.html'){
    document.getElementById('content').innerHTML=`<div class="loading">❌ No share ID provided</div>`;
    return;
  }
  try{
    const r=await fetch(API+'/api/agents/share/'+shareId);
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Not found');
    projectData=d;
    render(d);
    document.getElementById('share-bar').style.display='flex';
    // Track view
    fetch(API+'/api/agents/projects/'+d.project.id+'/analytics',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({event:'view'})
    }).catch(()=>{});
    // Update meta
    document.title=d.project.name+' | Built with NexusAI';
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="loading">❌ ${e.message}</div>`;
  }
}

function render(d){
  const project=d.project;
  const agents=d.agents||[];
  const ceo=agents.find(a=>a.name==='CEO Agent')?.output||{};
  const product=agents.find(a=>a.name==='Product Agent')?.output||{};
  const design=agents.find(a=>a.name==='Design Agent')?.output||{};
  const marketing=agents.find(a=>a.name==='Marketing Agent')?.output||{};
  const deploy=agents.find(a=>a.name==='Deploy Agent')?.output||{};

  let html=`
    <div class="hero">
      <div class="brand">
        <img src="https://nexusai-rust.vercel.app/logo.svg" alt=""/>
        <span>Built with NexusAI in minutes</span>
      </div>
      <div class="title">${esc(product.product_name||project.name)}</div>
      <div class="idea">${esc(product.tagline||project.idea)}</div>
      <div class="meta">
        <div class="meta-item">⏱️ ${new Date(project.created_at).toLocaleDateString()}</div>
        <div class="meta-item">🤖 ${agents.length} agents</div>
        <div class="meta-item">${project.status==='completed'?'✅ Complete':'⏳ '+project.status}</div>
      </div>
      <div class="cta-row">
        <a href="https://nexusai-rust.vercel.app" class="btn btn-primary">🚀 Build your own</a>
        <button class="btn btn-secondary" onclick="copyShare()">📋 Copy link</button>
      </div>
    </div>
  `;

  // CEO Strategy
  if(ceo.vision){
    html+=`<div class="section">
      <div class="section-title"><span class="section-emoji">👔</span> Strategy & Vision</div>
      <p style="color:#a0a0c0;line-height:1.6;margin-bottom:14px">${esc(ceo.vision)}</p>
      ${ceo.value_proposition?`<div style="background:#1a1a24;border-radius:8px;padding:12px;margin-bottom:12px"><div style="font-size:11px;color:#7a7a9a;text-transform:uppercase;margin-bottom:6px">Value Proposition</div><div style="font-size:14px">${esc(ceo.value_proposition)}</div></div>`:''}
      ${ceo.differentiators?.length?`<div style="margin-top:14px"><div style="font-size:13px;font-weight:600;margin-bottom:8px">🎯 Differentiators</div>${ceo.differentiators.map(d=>`<div class="tag">${esc(d)}</div>`).join('')}</div>`:''}
      ${ceo.target_market?.primary?`<div style="margin-top:14px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">🎯 Target Market</div><div style="font-size:13px;color:#a0a0c0">${esc(ceo.target_market.primary)}${ceo.target_market.size?' · '+esc(ceo.target_market.size):''}</div></div>`:''}
    </div>`;
  }

  // Product Features
  if(product.core_features?.length){
    html+=`<div class="section">
      <div class="section-title"><span class="section-emoji">📦</span> Core Features</div>
      <div class="feature-grid">
        ${product.core_features.map(f=>`<div class="feature-card">
          <div class="feature-name">${esc(f.name)}</div>
          <div class="feature-desc">${esc(f.description||'')}</div>
          ${f.priority?`<div class="priority ${f.priority.toLowerCase()}">${esc(f.priority)}</div>`:''}
        </div>`).join('')}
      </div>
    </div>`;
  }

  // User Personas
  if(product.user_personas?.length){
    html+=`<div class="section">
      <div class="section-title"><span class="section-emoji">👥</span> Target Users</div>
      ${product.user_personas.slice(0,3).map(p=>`<div class="persona-card">
        <div class="persona-name">${esc(p.name)}</div>
        <div style="font-size:12px;color:#a0a0c0">${esc(p.description||'')}</div>
        ${p.needs?.length?`<div class="persona-list"><strong>Needs:</strong><ul>${p.needs.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`:''}
      </div>`).join('')}
    </div>`;
  }

  // Landing Page Preview
  if(design.landing_page_html){
    html+=`<div class="section">
      <div class="section-title"><span class="section-emoji">🎨</span> Landing Page</div>
      <iframe class="preview-frame" srcdoc="${esc(design.landing_page_html).replace(/"/g,'&quot;')}"></iframe>
    </div>`;
  }

  // Marketing Sample
  if(marketing.product_hunt){
    html+=`<div class="section">
      <div class="section-title"><span class="section-emoji">📢</span> Launch Materials</div>
      ${marketing.product_hunt.tagline?`<div style="background:#1a1a24;border-radius:8px;padding:14px;margin-bottom:10px">
        <div style="font-size:11px;color:#7a7a9a;text-transform:uppercase;margin-bottom:6px">Product Hunt Tagline</div>
        <div style="font-size:14px;font-weight:600">${esc(marketing.product_hunt.tagline)}</div>
      </div>`:''}
      ${marketing.twitter_threads?.[0]?.hook?`<div style="background:#1a1a24;border-radius:8px;padding:14px;margin-bottom:10px">
        <div style="font-size:11px;color:#7a7a9a;text-transform:uppercase;margin-bottom:6px">Twitter Hook</div>
        <div style="font-size:14px">${esc(marketing.twitter_threads[0].hook)}</div>
      </div>`:''}
    </div>`;
  }

  // Deployment
  if(deploy.deployment_steps?.length){
    html+=`<div class="section">
      <div class="section-title"><span class="section-emoji">🚀</span> Ready to Deploy</div>
      <div style="font-size:13px;color:#a0a0c0;line-height:1.6">${deploy.deployment_steps.slice(0,5).map(s=>`<div style="padding:6px 0">→ ${esc(s)}</div>`).join('')}</div>
      ${deploy.estimated_cost?`<div class="tag" style="margin-top:10px">💰 ${esc(deploy.estimated_cost)}</div>`:''}
    </div>`;
  }

  // CTA Banner
  html+=`<div class="cta-banner">
    <h2>🚀 Build YOUR startup in minutes</h2>
    <p>This entire project was generated by 6 AI agents collaborating in real-time. No coding required.</p>
    <a href="https://nexusai-rust.vercel.app" class="btn btn-primary">Try NexusAI Free →</a>
  </div>`;

  html+=`<div class="footer">
    Built with <a href="https://nexusai-rust.vercel.app">NexusAI</a> · The AI that builds real products for you
  </div>`;

  document.getElementById('content').innerHTML=html;
}

function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function copyShare(){
  navigator.clipboard.writeText(location.href).catch(()=>{});
  const btn=event.target;const orig=btn.innerHTML;
  btn.innerHTML='✓';btn.style.color='#c6f135';
  setTimeout(()=>{btn.innerHTML=orig;btn.style.color='';},1500);
}

function shareTwitter(){
  const text=`Check out this AI-built startup: ${projectData?.project?.name||''}`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`,'_blank');
  trackShare();
}

function shareLinkedIn(){
  window.open(`https://linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(location.href)}`,'_blank');
  trackShare();
}

function shareWhatsApp(){
  const text=`Check out this AI-built startup: ${projectData?.project?.name||''} ${location.href}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,'_blank');
  trackShare();
}

function trackShare(){
  if(!projectData?.project?.id)return;
  fetch(API+'/api/agents/projects/'+projectData.project.id+'/analytics',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({event:'share'})
  }).catch(()=>{});
}

loadProject();
</script>

</body>
</html>
