<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexusAI</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7017XLCQQW"></script>
<script>
  window.dataLayer=window.dataLayer||[];
  function gtag(){dataLayer.push(arguments);}
  gtag('js',new Date());
  gtag('config','G-7017XLCQQW');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="logo.svg"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- AUTH -->
<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="logo.svg" width="40" height="40" alt="NexusAI"/>
      <span class="auth-brand-name">NexusAI</span>
    </div>
    <h1 class="auth-title" id="auth-heading">Welcome back</h1>
    <p class="auth-sub" id="auth-subtext">Sign in to continue</p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
    </div>
    <input class="auth-input" type="email" id="auth-email" placeholder="Email address" autocomplete="email"/>
    <input class="auth-input" type="password" id="auth-password" placeholder="Password" autocomplete="current-password"/>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Continue</button>
    <p class="auth-error" id="auth-error"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- Sidebar backdrop -->
  <div id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">
        <img src="logo.svg" width="22" height="22" alt=""/>
        <span>NexusAI</span>
      </div>
      <div class="sb-top-actions">
        <button class="sb-icon-btn" onclick="startNewChat()" title="New chat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="sb-icon-btn" onclick="closeSidebar()" title="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="sb-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search tools..." id="sb-search-input" oninput="handleToolSearch()"/>
    </div>

    <nav class="sb-nav">
      <button class="sb-nav-item active" data-page="home" onclick="navigate('home')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Home
      </button>
      <button class="sb-nav-item" data-page="tools" onclick="navigate('tools')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All Tools
        <span class="sb-badge">150+</span>
      </button>
      <button class="sb-nav-item" data-page="pdf" onclick="navigate('pdf')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        PDF Chat
      </button>
      <button class="sb-nav-item" data-page="projects" onclick="navigate('projects')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects
      </button>
      <button class="sb-nav-item" data-page="pricing" onclick="navigate('pricing')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Upgrade
      </button>

      <div class="sb-divider"></div>
      <div class="sb-section-label">Categories</div>

      <button class="sb-nav-item" data-page="cat-ai" onclick="navigate('cat-ai')"><span class="sb-emoji">🧠</span>AI Essentials</button>
      <button class="sb-nav-item" data-page="cat-code" onclick="navigate('cat-code')"><span class="sb-emoji">💻</span>Code & Dev</button>
      <button class="sb-nav-item" data-page="cat-business" onclick="navigate('cat-business')"><span class="sb-emoji">📈</span>Business</button>
      <button class="sb-nav-item" data-page="cat-content" onclick="navigate('cat-content')"><span class="sb-emoji">📱</span>Content</button>
      <button class="sb-nav-item" data-page="cat-media" onclick="navigate('cat-media')"><span class="sb-emoji">🎨</span>Image & Media</button>
      <button class="sb-nav-item" data-page="cat-video" onclick="navigate('cat-video')"><span class="sb-emoji">🎬</span>Video & Film</button>
      <button class="sb-nav-item" data-page="cat-audio" onclick="navigate('cat-audio')"><span class="sb-emoji">🔊</span>Voice & Audio</button>
      <button class="sb-nav-item" data-page="cat-productivity" onclick="navigate('cat-productivity')"><span class="sb-emoji">⚡</span>Productivity</button>
      <button class="sb-nav-item" data-page="cat-students" onclick="navigate('cat-students')"><span class="sb-emoji">🎓</span>Students</button>

      <div class="sb-divider"></div>
      <div class="sb-section-label">Recent</div>
      <div id="sb-history"></div>
    </nav>

    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">H</div>
        <div class="sb-user-info">
          <div class="sb-user-email" id="sb-email">user@email.com</div>
          <div class="sb-user-plan" id="sb-plan-label">Free Plan · 0/10</div>
        </div>
      </div>
      <button class="sb-icon-btn" onclick="logout()" title="Sign out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div id="main">

    <!-- Topbar -->
    <header id="topbar">
      <button class="top-icon-btn" onclick="openSidebar()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">NexusAI</div>
      <div class="topbar-actions">
        <div class="usage-badge" id="usage-badge">
          <span id="usage-label">0/10</span>
        </div>
        <button class="upgrade-btn" onclick="navigate('pricing')">Upgrade ✦</button>
        <button class="top-icon-btn" onclick="startNewChat()" title="New chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <div id="content"></div>

  </div>
</div>

<div id="toast-wrap"></div>
<script src="app.js"></script>
</body>
</html>
